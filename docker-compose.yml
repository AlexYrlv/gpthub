services:
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: gpthub-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - gpthub

  backend:
    build: .
    image: gpthub-backend:latest
    container_name: gpthub-backend
    restart: unless-stopped
    command: ["run", "server"]
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-http://ollama:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
    volumes:
      - ./config_docker.json:/app/config_fastapi.json:ro
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - gpthub

  memorize:
    build: .
    image: gpthub-backend:latest
    container_name: gpthub-memorize
    restart: unless-stopped
    command: ["run", "worker.memorize"]
    healthcheck:
      disable: true
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./config_docker.json:/app/config_fastapi.json:ro
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - gpthub

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: gpthub-ui
    restart: unless-stopped
    ports:
      - "3000:8080"
    env_file:
      - .env.openwebui
    depends_on:
      - backend
    volumes:
      - openwebui_data:/app/backend/data
    networks:
      - gpthub

  redis:
    image: redis:7-alpine
    container_name: gpthub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data
    networks:
      - gpthub

  minio:
    image: minio/minio:latest
    container_name: gpthub-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=gpthub
      - MINIO_ROOT_PASSWORD=gpthub-secret-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - minio_data:/data
    networks:
      - gpthub

  minio-init:
    image: minio/mc:latest
    container_name: gpthub-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 gpthub gpthub-secret-key;
      mc mb -p local/presentations || true;
      mc anonymous set download local/presentations;
      "
    networks:
      - gpthub

  mongodb:
    image: mongo:7
    container_name: gpthub-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - mongodb_data:/data/db
    networks:
      - gpthub

volumes:
  openwebui_data:
  redis_data:
  mongodb_data:
  minio_data:
  ollama_data:

networks:
  gpthub:
    driver: bridge
