version: "3"

silent: true

vars:
  PACKAGE: gpthub
  IMAGE: '{{ .IMAGE | default "gpthub-backend" }}'
  TAG: '{{ .TAG | default "latest" }}'
  PACKAGE_TARGET: '{{ .PACKAGE_TARGET | default "./dist" }}'
  API_URL: '{{ .API_URL | default "http://localhost:8000" }}'
  CHECK_URL: '{{ .CHECK_URL | default "http://localhost:8000/v1/health" }}'
  CHECK_TIMEOUT: '{{ .CHECK_TIMEOUT | default "60" }}'
  ENVIRONMENT: '{{ .ENVIRONMENT | default "production" }}'

env:
  POETRY_VIRTUALENVS_CREATE: "false"

tasks:
  default:
    deps:
      - version

  # === Execution ===

  server:
    desc: Run API server
    cmd: { task: _python-manage, vars: { CLI_ARGS: "run server" } }

  run:
    desc: Run command
    cmd: { task: _python-manage, vars: { CLI_ARGS: "run {{ .CLI_ARGS }}" } }

  worker.memorize:
    desc: Run memorize worker
    cmd: { task: _python-manage, vars: { CLI_ARGS: "run worker.memorize" } }

  debug:
    desc: Debug command
    cmd: { task: _python-manage, vars: { CLI_ARGS: "debug {{ .CLI_ARGS }}" } }

  cli:
    desc: Generic manage.py command
    cmd: { task: _python-manage, vars: { CLI_ARGS: "{{ .CLI_ARGS }}" } }

  shell:
    desc: Python REPL with app context
    cmd: { task: _python-manage, vars: { CLI_ARGS: "shell" } }

  check.alive:
    desc: Check service health
    cmd: { task: _python-manage, vars: { CLI_ARGS: "health alive -a {{ .CHECK_URL }} -t {{ .CHECK_TIMEOUT }}" } }

  # === Lint ===

  lint:
    desc: Run ruff linter
    cmd: ruff check .

  format:
    desc: Format code
    cmd: ruff format .

  check:
    desc: Lint + Test
    cmds:
      - task: lint
      - task: test

  ci:
    desc: Full CI pipeline (lint + test + docker build)
    cmds:
      - task: check
      - task: docker

  # === Test ===

  test:
    desc: Run unit tests
    cmds:
      - task: deps-install
      - cmd: pytest tests/ -v {{ .CLI_ARGS }}

  coverage:
    desc: Run tests with coverage report
    cmd: pytest tests/ -v --cov={{ .PACKAGE }} --cov-report=term-missing {{ .CLI_ARGS }}

  # === Deps ===

  install:
    desc: Install dependencies
    cmd: poetry install

  deps:
    desc: Regenerate lock file
    cmd: poetry lock --regenerate

  deps-install:
    desc: Install deps for environment
    cmd: poetry install --no-root --only {{ .GROUPS }}
    vars:
      GROUPS:
        sh: |
          case "{{ .ENVIRONMENT }}" in
            "develop" ) echo "main,tests,linter,dev" ;;
            "testing" ) echo "main,tests" ;;
            * ) echo "main" ;;
          esac

  # === Docker stack ===

  up:
    desc: Start full stack
    cmd: docker compose up -d

  down:
    desc: Stop full stack
    cmd: docker compose down

  restart:
    desc: Restart backend
    cmd: docker compose restart backend

  logs:
    desc: Follow logs
    cmd: docker compose logs -f {{ .CLI_ARGS | default "backend" }}

  ps:
    desc: Show running services
    cmd: docker compose ps

  # === Docker image ===

  docker:
    desc: Build (and optionally push) backend image
    cmd: docker buildx build --compress --rm
      {{ if eq .CACHE "false" }} --no-cache {{ end }}
      {{ if eq .PUSH "true" }} --push {{ end }}
      -t {{ .IMAGE }}:{{ .TAG }}
      .

  # === Smoke tests ===

  smoke.models:
    desc: GET /v1/models
    cmd: curl -fsS {{ .API_URL }}/v1/models | python3 -m json.tool | head -30

  smoke.chat:
    desc: POST /v1/chat/completions
    cmd: |
      curl -fsS -X POST {{ .API_URL }}/v1/chat/completions \
        -H "Content-Type: application/json" \
        -d '{"model":"auto","messages":[{"role":"user","content":"hi"}]}' \
        | python3 -m json.tool

  # === Services ===

  redis.cli:
    desc: Open Redis CLI
    cmd: docker compose exec redis redis-cli

  mongo.cli:
    desc: Open MongoDB shell
    cmd: docker compose exec mongodb mongosh

  # === Build ===

  build:
    desc: Build wheel package
    cmd: poetry build -f wheel -o {{ .PACKAGE_TARGET }}

  version:
    desc: Show version
    cmd: poetry version

  # === Internal ===

  _python-manage: /usr/bin/env python manage.py {{ .CLI_ARGS }}
